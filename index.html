<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA Cloud Universal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo" onclick="goToPath('')"><i class="fas fa-shuttle-space"></i> NEBULA</div>
            <div id="status"><i class="fas fa-signal"></i> Система готова</div>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" id="btnFolder"><i class="fas fa-folder-plus"></i> Папка</button>
            <label class="btn btn-primary">
                <i class="fas fa-cloud-upload-alt"></i> Загрузить файл
                <input type="file" id="fileInput" multiple style="display:none">
            </label>
                    </div>

        <div class="upload-progress" id="uploadBox" style="display: none;">
            <div class="up-info"><span id="upName">Файл</span> <span id="upPct">0%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="upFill"></div></div>
        </div>

        <div class="path-bar" id="breadcrumbs"></div>
        <div class="file-list" id="fileList"></div>
    </div>
    <div id="toast" class="toast"></div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="ui.js"></script>
<script src="uploader.js"></script>
<script src="downloader.js"></script>
<script src="deleter.js"></script>
<script src="main.js"></script>
<script src="progress.js"></script>
<script src="folder.js"></script>

</body>
</html>
